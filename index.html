<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Sentiment Matrix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --bg-base: #09090b;
            --bg-glass: rgba(24, 24, 27, 0.6);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
            --accent-bullish: #10b981;
            --accent-bearish: #ef4444;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --border-subtle: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.15), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1), transparent 30%),
                radial-gradient(circle at 50% 50%, rgba(239, 68, 68, 0.05), transparent 40%);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .pill-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            border-radius: 2rem;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0 0 1rem 0;
            background: linear-gradient(to right, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.25rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .global-controls {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 3rem;
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 2rem;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .value-display {
            font-size: 1.2rem;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-subtle);
        }

        /* Premium Sliders */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            outline: none;
            border: 1px solid var(--border-subtle);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .check-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            user-select: none;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .asset-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .asset-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .asset-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4), 0 0 15px rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .asset-card:hover::before {
            opacity: 1;
        }

        .asset-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .asset-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .asset-rank {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid var(--border-subtle);
        }

        .asset-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .asset-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }

        .asset-ticker {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .metrics-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .metric {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .metric-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .metric-value {
            font-size: 1.25rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .results-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1rem;
            padding: 1.25rem;
            border: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .score-huge {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .actions {
            text-align: center;
        }

        .btn-refresh {
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 3rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
        }

        .btn-refresh:active {
            transform: translateY(1px);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        @media (max-width: 768px) {
            .global-controls {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="pill-badge">Live Bayesian Lab</div>
            <h1>Crypto Sentiment Matrix</h1>
            <p class="subtitle">Global mathematical parameters overriding underlying market momentum.</p>
        </header>

        <div class="global-controls">
            <div class="control-group">
                <label>
                    Baseline Sentiment (C)
                    <span id="cValueDisplay" class="value-display">68%</span>
                </label>
                <input type="range" id="cSlider" min="0" max="100" value="68" oninput="window.updateDashboard()">
            </div>
            <div class="control-group">
                <label>
                    Confidence Threshold (m)
                    <span id="mValueDisplay" class="value-display">500,000</span>
                </label>
                <input type="range" id="mSlider" min="10000" max="2000000" step="10000" value="500000"
                    oninput="window.updateDashboard()">
            </div>
            <label class="check-group" onclick="window.updateDashboard()">
                <input type="checkbox" id="sortRaw" onchange="window.updateDashboard()">
                Sort by Raw %
            </label>
        </div>

        <div class="dashboard-grid" id="dashboard">
            <!-- Asset Cards Injected Here via JavaScript -->
        </div>

        <div class="actions">
            <button class="btn-refresh" id="refresh-btn" onclick="window.fetchData()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" id="refresh-icon">
                    <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3" />
                </svg>
                Sync with Network
            </button>
        </div>
    </div>

    <script>
        // Use var or simply assign to window to avoid scoping issues on GitHub Pages
        window.cryptoData = [];

        window.formatColor = (val) => {
            if (val >= 60) return 'var(--accent-bullish)';
            if (val <= 40) return 'var(--accent-bearish)';
            return '#eab308'; // Neutral
        };

        window.updateDashboard = () => {
            const cSlider = document.getElementById('cSlider');
            const mSlider = document.getElementById('mSlider');
            const sortRawCheck = document.getElementById('sortRaw');
            
            const C = parseFloat(cSlider.value) / 100;
            const m = parseInt(mSlider.value);
            const sortByRaw = sortRawCheck.checked;

            // Update Global Displays
            document.getElementById('cValueDisplay').innerText = `${cSlider.value}%`;
            document.getElementById('mValueDisplay').innerText = m.toLocaleString();

            const calculated = window.cryptoData.map(coin => {
                const v = coin.votes;
                const R = coin.raw / 100;
                // Bayesian Formula: W = ((v * R) + (m * C)) / (v + m)
                const W = ((v * R) + (m * C)) / (v + m);
                return { ...coin, weighted: W * 100 };
            });

            // Sorting Logic
            if (sortByRaw) {
                calculated.sort((a, b) => b.raw - a.raw);
            } else {
                calculated.sort((a, b) => b.weighted - a.weighted);
            }

            // Render
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = calculated.map((coin, index) => window.renderAssetCard(coin, index)).join('');
        };

        window.renderAssetCard = (coin, index) => {
            const iconHtml = coin.image 
                ? `<img src="${coin.image}" alt="${coin.symbol}" style="width: 100%; height: 100%; object-fit: cover;">`
                : `<div style="font-size: 1.25rem; font-weight: 800;">${coin.symbol[0]}</div>`;
                
            const scoreColor = window.formatColor(coin.weighted);
            const rawColor = window.formatColor(coin.raw);

            return `
                <div class="asset-card" id="card-${coin.symbol}">
                    <div class="asset-header">
                        <div class="asset-info">
                            <div class="asset-rank">#${index + 1}</div>
                            <div class="asset-icon">${iconHtml}</div>
                            <div>
                                <h2 class="asset-name">${coin.symbol}</h2>
                                <span class="asset-ticker">${coin.name}</span>
                            </div>
                        </div>
                    </div>

                    <div class="metrics-row">
                        <div class="metric">
                            <span class="metric-title">Community Votes</span>
                            <span class="metric-value">${coin.votes.toLocaleString()}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-title">Price</span>
                            <span class="metric-value">$${coin.current_price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 6})}</span>
                        </div>
                    </div>

                    <div class="results-panel">
                        <div class="metric">
                            <span class="metric-title">Raw Sentiment</span>
                            <span class="metric-value" style="color: ${rawColor}; font-size: 1.25rem;">${coin.raw.toFixed(1)}%</span>
                        </div>
                        <div class="metric" style="text-align: right;">
                            <span class="metric-title" style="color: ${scoreColor}">Weighted Score</span>
                            <span class="metric-value score-huge" style="color: ${scoreColor}">${coin.weighted.toFixed(2)}%</span>
                        </div>
                    </div>
                </div>
            `;
        };

        window.fetchData = async () => {
            const icon = document.getElementById('refresh-icon');
            if (icon) icon.classList.add('spin');

            try {
                // Fetch from our local scraper JSON
                const res = await fetch(\`./data.json?t=\${new Date().getTime()}\`);
                if (res.ok) {
                    const data = await res.json();
                    
                    // Transform JSON Map into array required for the User's Math
                    window.cryptoData = Object.keys(data).map(ticker => {
                        const d = data[ticker];
                        return {
                            name: d.name,
                            symbol: ticker,
                            image: d.image,
                            current_price: d.current_price || 0,
                            // Raw Sentiment (derived from scraper logic)
                            raw: d.likelihood || 50, 
                            // Approximation of "votes" using 24h volume (scaled down so it fits mathematical model)
                            votes: d.total_volume ? Math.max(10000, Math.floor(d.total_volume / 1000)) : 500000, 
                        }
                    });

                    // Trigger mathematical render
                    window.updateDashboard();

                } else {
                    console.error("Failed to load data.json");
                }
            } catch (err) {
                console.error("Network or parsing error", err);
            } finally {
                if (icon) setTimeout(() => icon.classList.remove('spin'), 800);
            }
        };

        // Ensure window.fetchData only runs after load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', window.fetchData);
        } else {
            window.fetchData();
        }
    </script>
</body>

</html>
